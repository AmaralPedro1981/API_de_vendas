spring:
  datasource:
    driverClassName: org.h2.Driver
    url: jdbc:h2:mem:vendas
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        show_sql: true
        format_sql: true

  h2:
    console:
      enabled: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

rabbitmq:
  queue: pedidos.queue
  exchange: pedidos.exchange
  routingkey: pedidos.routingkey